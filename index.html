<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Bank Account Simulator</title>
</head>

<body>

    <!-- modal-login -->
    <div class="cardLogin">
        <h4 class="title">Entrar!</h4>
        <form id="formLogin">
            <div class="field">
                <svg class="input-icon" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M207.8 20.73c-93.45 18.32-168.7 93.66-187 187.1c-27.64 140.9 68.65 266.2 199.1 285.1c19.01 2.888 36.17-12.26 36.17-31.49l.0001-.6631c0-15.74-11.44-28.88-26.84-31.24c-84.35-12.98-149.2-86.13-149.2-174.2c0-102.9 88.61-185.5 193.4-175.4c91.54 8.869 158.6 91.25 158.6 183.2l0 16.16c0 22.09-17.94 40.05-40 40.05s-40.01-17.96-40.01-40.05v-120.1c0-8.847-7.161-16.02-16.01-16.02l-31.98 .0036c-7.299 0-13.2 4.992-15.12 11.68c-24.85-12.15-54.24-16.38-86.06-5.106c-38.75 13.73-68.12 48.91-73.72 89.64c-9.483 69.01 43.81 128 110.9 128c26.44 0 50.43-9.544 69.59-24.88c24 31.3 65.23 48.69 109.4 37.49C465.2 369.3 496 324.1 495.1 277.2V256.3C495.1 107.1 361.2-9.332 207.8 20.73zM239.1 304.3c-26.47 0-48-21.56-48-48.05s21.53-48.05 48-48.05s48 21.56 48 48.05S266.5 304.3 239.1 304.3z">
                    </path>
                </svg>
                <input autocomplete="off" id="logUser" placeholder="Nome de usuário" class="input-field" name="User"
                    type="text">
            </div>
            <div class="field">
                <svg class="input-icon" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M80 192V144C80 64.47 144.5 0 224 0C303.5 0 368 64.47 368 144V192H384C419.3 192 448 220.7 448 256V448C448 483.3 419.3 512 384 512H64C28.65 512 0 483.3 0 448V256C0 220.7 28.65 192 64 192H80zM144 192H304V144C304 99.82 268.2 64 224 64C179.8 64 144 99.82 144 144V192z">
                    </path>
                </svg>
                <input autocomplete="off" id="logpass" placeholder="Senha" class="input-field" name="logpass"
                    type="text">
            </div>

            <button class="btn btnlogin" type="submit">Login</button>

            <span class="msgError errorLogin"></span>

            <a href="#" class="btn-link btn-for-register">Não tem uma conta? Cadastre-se</a>
        </form>
    </div>

    <!-- modal-REGISTER -->
    <div class="cardRegister">
        <h4 class="title">Registrar!</h4>
        <form id="formRegister">
            <!--Campo de Usuario-->
            <div class="field">
                <svg class="input-icon" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M207.8 20.73c-93.45 18.32-168.7 93.66-187 187.1c-27.64 140.9 68.65 266.2 199.1 285.1c19.01 2.888 36.17-12.26 36.17-31.49l.0001-.6631c0-15.74-11.44-28.88-26.84-31.24c-84.35-12.98-149.2-86.13-149.2-174.2c0-102.9 88.61-185.5 193.4-175.4c91.54 8.869 158.6 91.25 158.6 183.2l0 16.16c0 22.09-17.94 40.05-40 40.05s-40.01-17.96-40.01-40.05v-120.1c0-8.847-7.161-16.02-16.01-16.02l-31.98 .0036c-7.299 0-13.2 4.992-15.12 11.68c-24.85-12.15-54.24-16.38-86.06-5.106c-38.75 13.73-68.12 48.91-73.72 89.64c-9.483 69.01 43.81 128 110.9 128c26.44 0 50.43-9.544 69.59-24.88c24 31.3 65.23 48.69 109.4 37.49C465.2 369.3 496 324.1 495.1 277.2V256.3C495.1 107.1 361.2-9.332 207.8 20.73zM239.1 304.3c-26.47 0-48-21.56-48-48.05s21.53-48.05 48-48.05s48 21.56 48 48.05S266.5 304.3 239.1 304.3z">
                    </path>
                </svg>
                <input autocomplete="off" id="registerUser" placeholder="Nome de usuário" class="input-field"
                    name="User" type="text">
            </div>
            <!--Campo de senha-->
            <div class="field">
                <svg class="input-icon" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M80 192V144C80 64.47 144.5 0 224 0C303.5 0 368 64.47 368 144V192H384C419.3 192 448 220.7 448 256V448C448 483.3 419.3 512 384 512H64C28.65 512 0 483.3 0 448V256C0 220.7 28.65 192 64 192H80zM144 192H304V144C304 99.82 268.2 64 224 64C179.8 64 144 99.82 144 144V192z">
                    </path>
                </svg>
                <input autocomplete="off" id="registerPass" placeholder="Senha" class="input-field" name="logpass"
                    type="text">
            </div>

            <!--Confirmação de senha-->
            <div class="field">
                <svg class="input-icon" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M80 192V144C80 64.47 144.5 0 224 0C303.5 0 368 64.47 368 144V192H384C419.3 192 448 220.7 448 256V448C448 483.3 419.3 512 384 512H64C28.65 512 0 483.3 0 448V256C0 220.7 28.65 192 64 192H80zM144 192H304V144C304 99.82 268.2 64 224 64C179.8 64 144 99.82 144 144V192z">
                    </path>
                </svg>
                <input autocomplete="off" id="registerPassConfirmation" placeholder="Confimar Senha" class="input-field"
                    name="logpass" type="password">
            </div>
            <button class="btn btnRegister" type="submit">Login</button>

            <span class="msgError errorRegister"></span>

            <a href="#" class="btn-link btn-for-login">Já tem uma conta? Faça login!</a>
        </form>
    </div>


    <!--Modal de registro bem sucedido-->
    <div class="registroCard">
        <div class="cardMSG">

            <div class="sucessoLogo">
                <img src="ASSETS/icons/Marca de verificação verde vibrante - Copia.png" alt="IMAGEM">
            </div>
            <div class="msg">
                <h3>Registro bem sucedido!</h3>
                <h4>Suas credenciais foram salvas</h4>
            </div>

            <div class="removerModalSucesso">
                <img src="ASSETS/icons/x-sem-fundo.png" alt="">
            </div>

        </div>
    </div>



    <div class="container">
        <div class="nav-header">
            <div class="nav-tabs">
                <span class="active">Home</span>
            </div>
            <div class="profile-icon">
                <img src="ASSETS/profile-icon/profile-perfil.jpg" alt="">
            </div>
        </div>

        <h1>Conta Bancária</h1>

        <!-- área de saldo -->
        <div class="saldo-area">
            <p>Saldo:</p>
            <h2 id="saldo">R$ 0</h2>
            <p id="status">Conta Zerada</p>
        </div>

        <!-- input valor -->
        <div class="valor-input">
            <input type="number" id="valor" placeholder="Digite um valor" />
            <input type="number" id="destinatario" placeholder="Digite o ID do destinatário" />
        </div>

        <section id="sectionConfirm">
            <div class="cardconfirmacao">
                <h3>Confirmar envio</h3>

                <span id="msgConfirm"></span>

                <div class="confirmar">
                    <button id="nao">Cancelar</button>
                    <button id="sim">Confirmar</button>
                </div>
            </div>
        </section>

        <!-- botões -->
        <div class="botoes">
            <button id="depositar">Depositar</button>
            <button id="sacar">Sacar</button>
            <button id="Transferir">Transferir</button>
        </div>

        <!--transferir novamente -->
        <div class="profile-transfer">
            <h3>Transferir novamente</h3>
            <div class="accounts">
                <button class="contact-item" data-user-id="2" data-name="Maria">
                    <div class="profile-icon">
                        <img src="ASSETS/profile-icon/maria-profile-icon.jpg" alt="">
                    </div>
                    <div class="contact-info">
                        <strong>Maria</strong>
                        <span>ID: 2</span>
                    </div>
                </button>

                <button class="contact-item" data-user-id="3" data-name="Joao">
                    <div class="profile-icon">
                        <img src="ASSETS/profile-icon/joao-profile-icon.jpg" alt="">
                    </div>
                    <div class="contact-info">
                        <strong>João</strong>
                        <span>ID: 3</span>
                    </div>
                </button>

                <button class="contact-item" data-user-id="4" data-name="Lucas">
                    <div class="profile-icon">
                        <img src="ASSETS/profile-icon/lucas-profile-icon.jpg" alt="">
                    </div>
                    <div class="contact-info">
                        <strong>Lucas</strong>
                        <span>ID: 4</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- título de transações -->
        <div class="transactions-header">
            <h3> Últimas transações</h3>
        </div>

        <!-- lista de transações  -->
        <div class="transaction-list">
            <ul id="mensagem"></ul>
        </div>

        <footer>
            Transações seguras | Simulador bancário
        </footer>
    </div>

    <script src="JS/models/contaBancaria.js"></script>
    <script src="JS/UI/UI.JS"></script>
    <script src="JS/services/bancoService.JS"></script>
    <script src="JS/app.js"></script>



</body>

</html>
