<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Bank Account Simulator</title>
</head>

<body>

<div class="container">

<h1>Conta Bancária - Pedro</h1>

<div class="saldo-area">
<p>Saldo:</p>
<h2 id="saldo">R$ 0</h2>
<p id="status">Conta Zerada</p>
</div>

<input 
type="number"
id="valor"
placeholder="Digite um valor"
/>

<div class="botoes">

<button id="depositar">Depositar</button>
<button id="sacar">Sacar</button>
<button id="Transferir">Transferir</button>

</div>


<div>
<ul id="mensagem"></ul>
</div>

<script src="script.js"></script>

</body>
</html>
