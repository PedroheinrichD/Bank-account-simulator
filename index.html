<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Bank Account Simulator</title>
</head>

<body>

    <div class="container">
        <div class="nav-header">
            <div class="nav-tabs">
                <span class="active">Home</span>
            </div>
            <div class="profile-icon">
            </div>
        </div>

        <h1>Conta Bancária</h1>

        <!-- área de saldo -->
        <div class="saldo-area">
            <p>Saldo:</p>
            <h2 id="saldo">R$ 0</h2>
            <p id="status">Conta Zerada</p>
        </div>

        <!-- input valor -->
        <div class="valor-input">
            <input type="number" id="valor" placeholder="Digite um valor" />
        </div>

        <!-- botões -->
        <div class="botoes">
            <button id="depositar">Depositar</button>
            <button id="sacar">Sacar</button>
            <button id="Transferir">Transferir</button>
        </div>

        <!-- select de usuários -->
        <div class="select-transfer">
            <select name="usuarios" id="select">
                <option value="selecione">Selecione para quem irá transferir</option>
                <option value="Maria">Maria</option>
                <option value="Joao">João</option>
            </select>
        </div>

        <!-- título de transações -->
        <div class="transactions-header">
            <h3> Últimas transações</h3>
        </div>

        <!-- lista de transações  -->
        <div class="transaction-list">
            <ul id="mensagem"></ul>
        </div>

        <footer>
             Transações seguras | Simulador bancário
        </footer>
    </div>

    <script src="JS/models/contaBancaria.js"></script>
    <script src="JS/services/bancoService.JS"></script>
    <script src="JS/UI/UI.JS"></script>
    <script src="JS/app.js"></script>
    <script src="JS/eventos/eventos.js"></script>

</body>

</html>
